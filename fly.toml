app = "arxivmedia"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ARXIVMEDIA_DB = "/data/arxivmedia.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "arxivmedia_data"
  destination = "/data"
