app = "papermolt"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PAPERMOLT_DB = "/data/papermolt.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "papermolt_data"
  destination = "/data"
